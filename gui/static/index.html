<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>OBQ Factor Lab</title>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <style>
    /* ── Table pane ─────────────────────────────── */
    .fl-tbl-header { display:flex; padding:4px 8px; background:var(--bg-panel); border-bottom:1px solid var(--border); flex-shrink:0; user-select:none; }
    .fl-th { font-size:9px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; padding:3px 4px; cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:2px; }
    .fl-th:hover { color:var(--accent); }
    .fl-th.sorted { color:var(--accent); }
    .fl-sort-arrow { font-size:8px; }
    .fl-tbl-body { flex:1; overflow-y:auto; }
    .fl-tr { display:flex; padding:5px 8px; border-bottom:1px solid var(--border); cursor:pointer; align-items:center; border-left:3px solid transparent; }
    .fl-tr:hover { background:var(--bg-panel); }
    .fl-tr.active { border-left-color:var(--accent); background:var(--bg-panel); }
    .fl-tr.pos { border-left-color:#16a34a; }
    .fl-tr.neg { border-left-color:#dc2626; }
    .fl-td { font-size:11px; color:var(--text); padding:0 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .fl-td.g { color:#16a34a; font-weight:600; }
    .fl-td.r { color:#dc2626; font-weight:600; }
    .fl-td.dim { color:var(--text-dim); font-size:10px; }

    /* ── Resizable layout ───────────────────────── */
    #layout { display:flex; flex:1; overflow:hidden; min-height:0; }
    #left-pane  { display:flex; flex-direction:column; overflow:hidden; min-width:200px; }
    #divider    { width:5px; background:var(--border); cursor:col-resize; flex-shrink:0; transition:background .15s; }
    #divider:hover, #divider.dragging { background:var(--accent); }
    #ts-panel   { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); min-width:300px; }

    /* ── Tearsheet empty state ──────────────────── */
    .ts-empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
    .ts-empty-icon { font-size:32px; opacity:.3; }
    .ts-empty-msg  { font-size:11px; color:var(--text-muted); }

    /* ── Tearsheet content ──────────────────────── */
    #ts-content { display:none; flex:1; flex-direction:column; overflow-y:auto; }
    #ts-content.active { display:flex; }

    .ts-topbar { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; background:var(--bg-panel); border-bottom:1px solid var(--border); flex-shrink:0; }
    .ts-name   { font-size:13px; font-weight:800; color:var(--accent); letter-spacing:1px; }
    .ts-meta   { font-size:9px; color:var(--text-muted); margin-top:2px; }
    .btn-pdf   { background:var(--accent2); color:#fff; border:none; padding:5px 12px; font-size:9px; font-weight:700; cursor:pointer; border-radius:3px; letter-spacing:.5px; font-family:var(--font); }
    .btn-pdf:hover { opacity:.85; }

    /* ── KPI strip — 6 cols ─────────────────────── */
    .ts-kpi-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:1px; background:var(--border); flex-shrink:0; }
    .ts-kpi      { background:#fff; padding:8px 6px; text-align:center; }
    .ts-kpi-lbl  { font-size:8px; color:#6b7280; text-transform:uppercase; letter-spacing:.8px; margin-bottom:3px; }
    .ts-kpi-val  { font-size:15px; font-weight:700; color:#111; }
    .ts-kpi-val.g { color:#16a34a; }
    .ts-kpi-val.r { color:#dc2626; }
    .ts-kpi-val.a { color:var(--accent); }

    /* ── Plotly chart boxes ─────────────────────── */
    .ts-charts     { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:10px 12px; flex-shrink:0; }
    .ts-charts.wide{ grid-template-columns:1fr; }
    .ts-chart-box  { background:#fff; border:1px solid #e5e7eb; border-radius:4px; padding:8px 10px; overflow:hidden; }
    .ts-chart-box h6 { font-size:8px; font-weight:700; color:#6b7280; letter-spacing:1px; text-transform:uppercase; margin-bottom:4px; }
    .ts-plotly     { width:100%; height:220px; }
    .ts-plotly.sm  { height:170px; }

    /* ── Metrics table ──────────────────────────── */
    .ts-mets-grid  { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); margin:0 12px 12px; }
    .ts-met-row    { display:flex; justify-content:space-between; padding:4px 10px; background:#fff; border-bottom:1px solid #f3f4f6; }
    .ts-met-lbl    { font-size:10px; color:#6b7280; }
    .ts-met-val    { font-size:10px; font-weight:600; color:#111; }
    .ts-met-val.g  { color:#16a34a; }
    .ts-met-val.r  { color:#dc2626; }
    .ts-met-sec    { grid-column:1/-1; font-size:8px; font-weight:700; color:#0066cc; letter-spacing:1px; text-transform:uppercase; padding:6px 10px 2px; background:#eff6ff; border-top:1px solid #dbeafe; }

    /* ── Heatmap ────────────────────────────────── */
    .ts-heatmap    { margin:0 12px 8px; overflow-x:auto; flex-shrink:0; }
    .ts-sec-hdr    { font-size:9px; font-weight:700; color:#6b7280; letter-spacing:1.2px; text-transform:uppercase; padding:8px 14px 4px; background:#f8f9fa; border-top:1px solid #e5e7eb; border-bottom:1px solid #e5e7eb; margin-top:2px; flex-shrink:0; }

    /* ── Config bar ─────────────────────────────── */
    .fl-config { padding:8px 12px; background:var(--bg-panel); border-bottom:1px solid var(--border); flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
    .fl-config-row { display:flex; gap:6px; align-items:flex-end; flex-wrap:wrap; }
    .fl-config select, .fl-config input { background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--font); font-size:11px; padding:4px 7px; border-radius:3px; outline:none; }
    .fl-config select:focus, .fl-config input:focus { border-color:var(--accent); }
    .fl-config label { font-size:9px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:2px; }
    .fl-config .fld { display:flex; flex-direction:column; }
    .fl-prog  { height:3px; background:var(--bg-panel); flex-shrink:0; overflow:hidden; }
    .fl-prog-fill { height:100%; background:var(--accent); transition:width .3s; width:0; }
    .btn-run-fl { background:var(--accent2); color:#fff; border:none; padding:6px 16px; font-size:11px; font-weight:700; cursor:pointer; border-radius:3px; font-family:var(--font); white-space:nowrap; }
    .btn-run-fl:hover { opacity:.85; }
    .btn-run-fl:disabled { opacity:.4; cursor:not-allowed; }
    #nav::-webkit-scrollbar { display:none; }
  </style>
</head>
<body data-theme="">

<!-- ── Nav ──────────────────────────────────────────────────────────── -->
<nav id="nav">
  <div class="nav-brand">
    OBQ FACTOR LAB
    <div class="view-tabs" id="view-tabs">
      <button class="view-tab" data-tab="config"   onclick="switchTab('config')">CONFIGURE</button>
      <button class="view-tab" data-tab="quintile" onclick="switchTab('quintile')">QUINTILE</button>
      <button class="view-tab active" data-tab="topn" onclick="switchTab('topn')">TOP-N</button>
      <button class="view-tab" data-tab="results"  onclick="switchTab('results')">RESULTS</button>
    </div>
  </div>
  <div class="nav-right">
    <span id="gpu-indicator" style="font-size:9px;color:var(--text-muted)">GPU —</span>
    <button class="nav-snap-btn" onclick="snapScreen()" title="Dev screenshot" style="font-size:11px;padding:0 8px;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:none;color:var(--text-dim)">SNAP</button>
    <button class="nav-theme-btn" onclick="toggleTheme()">THEME</button>
  </div>
</nav>

<!-- ── Layout ───────────────────────────────────────────────────────── -->
<div id="layout">

  <!-- LEFT pane -->
  <div id="left-pane">
    <!-- Config -->
    <div class="fl-config" id="config-bar">
      <div class="fl-config-row">
        <div class="fld"><label>MODE</label>
          <select id="cfg-mode" onchange="onModeChange()">
            <option value="quintile">Quintile Bins</option>
            <option value="topn" selected>Top-N Portfolio</option>
          </select>
        </div>
        <div class="fld"><label>FACTOR</label>
          <select id="cfg-factor">
            <option value="value">Value</option><option value="quality">Quality</option>
            <option value="growth">Growth</option><option value="finstr">Fin Strength</option>
            <option value="momentum">Momentum</option><option value="jcn" selected>JCN Composite</option>
            <option value="qarp">QARP</option><option value="garp">GARP</option>
            <option value="longeq">LongEQ</option><option value="moat">Moat</option>
            <option value="rulebreaker">Rulebreaker</option>
          </select>
        </div>
        <div class="fld"><label>START</label><input type="date" id="cfg-start" value="2010-01-31" style="width:120px"/></div>
        <div class="fld"><label>END</label><input type="date" id="cfg-end" style="width:120px"/></div>
        <div class="fld"><label>REBALANCE</label>
          <select id="cfg-rebal"><option value="Monthly" selected>Monthly</option><option value="Quarterly">Quarterly</option><option value="Annual">Annual</option></select>
        </div>
        <div class="fld" id="fld-topn"><label>TOP N</label><input type="number" id="cfg-topn" value="30" min="5" max="500" style="width:60px"/></div>
        <div class="fld" id="fld-bins" style="display:none"><label>BINS</label>
          <select id="cfg-bins"><option value="5" selected>5</option><option value="10">10</option></select>
        </div>
        <div class="fld"><label>MIN $</label><input type="number" id="cfg-minprice" value="2" min="0" step="0.5" style="width:55px"/></div>
        <div class="fld"><label>COSTS bps</label><input type="number" id="cfg-costs" value="15" min="0" style="width:55px"/></div>
        <button class="btn-run-fl" id="run-btn" onclick="startRun()">&#9654; RUN</button>
        <button class="btn-sm" style="background:var(--bg-panel2);border-color:var(--accent);color:var(--accent)" onclick="startSPY()" title="SPY benchmark">&#9654; SPY</button>
      </div>
    </div>

    <div class="fl-prog"><div class="fl-prog-fill" id="prog-fill"></div></div>
    <div class="status-bar" id="status-bar">Ready</div>

    <!-- Table header -->
    <div class="fl-tbl-header">
      <div class="fl-th" style="flex:0 0 75px" onclick="sortBy('run_label')">RUN <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 55px" onclick="sortBy('cagr')">CAGR <span class="fl-sort-arrow">&#9660;</span></div>
      <div class="fl-th" style="flex:0 0 50px" onclick="sortBy('sharpe')">SHRPE <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 55px" onclick="sortBy('max_dd')">MAX DD <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 48px" onclick="sortBy('win_rate_monthly')">WIN% <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 48px" onclick="sortBy('sortino')">SRTN <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 48px" onclick="sortBy('ann_vol')">VOL <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 48px" onclick="sortBy('calmar')">CALM <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 55px" onclick="sortBy('surefire_ratio')">SUREFIRE <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 48px" onclick="sortBy('omega')">OMEGA <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 45px" onclick="sortBy('lake_ratio')">LAKE <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 40px" onclick="sortBy('n_periods')">N MO <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 45px" onclick="sortBy('profit_factor')">PF <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 50px" onclick="sortBy('system_score')">SYSSC <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 42px" onclick="sortBy('equity_r2')">EQ R2 <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:0 0 38px" onclick="sortBy('elapsed_s')">TIME <span class="fl-sort-arrow"></span></div>
      <div class="fl-th" style="flex:1">STATUS</div>
    </div>

    <!-- Table body -->
    <div class="fl-tbl-body" id="tbl-body">
      <div class="log-empty" id="tbl-empty">No runs yet — click RUN to start</div>
    </div>
  </div>

  <!-- Draggable divider -->
  <div id="divider"></div>

  <!-- RIGHT: tearsheet -->
  <div id="ts-panel">
    <div class="ts-empty" id="ts-empty">
      <div class="ts-empty-icon">&#9672;</div>
      <div class="ts-empty-msg">Click a run in the table to view tearsheet</div>
    </div>
    <div id="ts-content"></div>
  </div>

</div>

<script src="/static/js/plotly.min.js"></script>
<script src="/static/js/tearsheet.js"></script>
<script src="/static/js/app.js"></script>

<script>
// ── Resizable divider ─────────────────────────────────────────────────
(function() {
  const div = document.getElementById("divider");
  const left = document.getElementById("left-pane");
  let dragging = false, startX, startW;

  div.addEventListener("mousedown", e => {
    dragging = true; startX = e.clientX; startW = left.offsetWidth;
    div.classList.add("dragging");
    document.body.style.cursor = "col-resize";
    document.body.style.userSelect = "none";
  });
  document.addEventListener("mousemove", e => {
    if (!dragging) return;
    const w = Math.max(200, Math.min(startW + e.clientX - startX, window.innerWidth - 350));
    left.style.width = w + "px";
    left.style.flex = "none";
  });
  document.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    div.classList.remove("dragging");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
    // Trigger Plotly resize
    document.querySelectorAll(".ts-plotly").forEach(el => {
      if (el.id) try { Plotly.Plots.resize(el); } catch(e) {}
    });
  });
})();
</script>
</body>
</html>
